version: 2

models:
  - name: week5_events
    description: "Event sourcing records for document processing"
    columns:
      - name: event_id
        description: "Unique event identifier"
        tests:
          - not_null
          - unique
      
      - name: event_type
        description: "Type of event"
        tests:
          - not_null
          - accepted_values:
              values: ['DocumentProcessed', 'DocumentSubmitted', 'DocumentFailed']
      
      - name: aggregate_id
        description: "Aggregate identifier"
        tests:
          - not_null
      
      - name: aggregate_type
        description: "Type of aggregate"
        tests:
          - not_null
      
      - name: sequence_number
        description: "Monotonically increasing sequence number"
        tests:
          - not_null
      
      - name: schema_version
        description: "Version of the event schema"
        tests:
          - not_null
      
      - name: occurred_at
        description: "When the event occurred"
        tests:
          - not_null
      
      - name: recorded_at
        description: "When the event was recorded"
        tests:
          - not_null
          - relationships:
              to: ref('occurred_at')
              field: occurred_at
              operator: '>='
