
# Contract Registry - Complete Subscriptions
# Covers EVERY inter-system dependency arrow in the data flow diagram

subscriptions:
  # ============================================
  # Week 1 → Week 2: Intent to Verdict
  # ============================================
  - contract_id: week1_intent_records
    subscriber_id: week2_digital_courtroom
    subscriber_team: week2
    fields_consumed: [intent_id, code_refs, confidence]
    breaking_fields:
      - field: code_refs
        reason: Verdict target_ref must reference valid code_refs.file
      - field: confidence
        reason: Used in verdict confidence scoring
    validation_mode: ENFORCE
    registered_at: '2026-04-01T10:00:00Z'
    contact: week2-team@org.com

  # ============================================
  # Week 3 → Week 4: Extractions to Lineage
  # ============================================
  - contract_id: week3_document_refinery
    subscriber_id: week4_cartographer
    subscriber_team: week4
    fields_consumed: [doc_id, extracted_facts, extraction_model]
    breaking_fields:
      - field: extracted_facts.confidence
        reason: used for node ranking; scale change breaks ranking logic
      - field: doc_id
        reason: primary key for node identity in lineage graph
    validation_mode: ENFORCE
    registered_at: '2026-04-01T10:00:00Z'
    contact: week4-team@org.com

  # ============================================
  # Week 3 → Week 5: Extractions to Events
  # ============================================
  - contract_id: week3_document_refinery
    subscriber_id: week5_event_sourcing
    subscriber_team: week5
    fields_consumed: [doc_id, extracted_facts, source_hash]
    breaking_fields:
      - field: doc_id
        reason: Used as aggregate_id in events
      - field: extracted_facts.confidence
        reason: Stored in event payload
    validation_mode: ENFORCE
    registered_at: '2026-04-01T10:00:00Z'
    contact: week5-team@org.com

  # ============================================
  # Week 3 → Week 7: Extractions to Enforcer (AI Extensions)
  # ============================================
  - contract_id: week3_document_refinery
    subscriber_id: week7_ai_extensions
    subscriber_team: week7
    fields_consumed: [extracted_facts.text, extracted_facts.confidence, doc_id]
    breaking_fields:
      - field: extracted_facts.text
        reason: Embedding drift detection baseline
      - field: extracted_facts.confidence
        reason: Used in embedding drift correlation
    validation_mode: AUDIT
    registered_at: '2026-04-01T10:00:00Z'
    contact: week7-team@org.com

  # ============================================
  # Week 4 → Week 7: Lineage to Attributor
  # ============================================
  - contract_id: week4_lineage_snapshots
    subscriber_id: week7_violation_attributor
    subscriber_team: week7
    fields_consumed: [nodes, edges, git_commit]
    breaking_fields:
      - field: nodes
        reason: Used to find upstream producers
      - field: edges
        reason: Used for lineage traversal and blast radius
    validation_mode: ENFORCE
    registered_at: '2026-04-01T10:00:00Z'
    contact: week7-team@org.com

  # ============================================
  # Week 5 → Week 7: Events to Enforcer
  # ============================================
  - contract_id: week5_event_sourcing
    subscriber_id: week7_enforcer
    subscriber_team: week7
    fields_consumed: [sequence_number, event_type, payload]
    breaking_fields:
      - field: sequence_number
        reason: Monotonicity required for event ordering validation
      - field: event_type
        reason: Must match registered schema
    validation_mode: ENFORCE
    registered_at: '2026-04-01T10:00:00Z'
    contact: week7-team@org.com

  # ============================================
  # Week 2 → Week 7: Verdicts to AI Extensions
  # ============================================
  - contract_id: week2_verdict_records
    subscriber_id: week7_ai_extensions
    subscriber_team: week7
    fields_consumed: [overall_verdict, scores, confidence]
    breaking_fields:
      - field: overall_verdict
        reason: Must be PASS/FAIL/WARN for LLM output validation
      - field: scores
        reason: Must contain integer 1-5 scores
    validation_mode: AUDIT
    registered_at: '2026-04-01T10:00:00Z'
    contact: week7-team@org.com

  # ============================================
  # LangSmith → Week 7: Traces to AI Extensions
  # ============================================
  - contract_id: langsmith_traces
    subscriber_id: week7_ai_extensions
    subscriber_team: week7
    fields_consumed: [run_type, total_tokens, prompt_tokens, completion_tokens, total_cost]
    breaking_fields:
      - field: total_tokens
        reason: Must equal prompt_tokens + completion_tokens
      - field: run_type
        reason: Must be one of llm/chain/tool/retriever/embedding
    validation_mode: AUDIT
    registered_at: '2026-04-01T10:00:00Z'
    contact: week7-team@org.com
